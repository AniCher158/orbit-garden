<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" role="img" aria-labelledby="title desc">
  <title id="title">Orbit Garden screenshot placeholder</title>
  <desc id="desc">A dark starry frame that says to add a project screenshot after deployment.</desc>
  <defs><radialGradient id="g"><stop stop-color="#8edbc7"/><stop offset=".55" stop-color="#6d68bd"/><stop offset="1" stop-color="#17203c"/></radialGradient></defs>
  <rect width="1400" height="800" rx="32" fill="#070918"/>
  <g fill="#fff" opacity=".3"><circle cx="120" cy="100" r="2"/><circle cx="360" cy="180" r="1.5"/><circle cx="1180" cy="120" r="2"/><circle cx="1020" cy="650" r="1.5"/><circle cx="180" cy="620" r="1"/></g>
  <ellipse cx="700" cy="390" rx="255" ry="72" fill="none" stroke="#8edbc7" stroke-opacity=".28" stroke-width="10" transform="rotate(-12 700 390)"/>
  <circle cx="700" cy="390" r="150" fill="url(#g)"/><circle cx="650" cy="340" r="55" fill="#fff" opacity=".12"/>
  <text x="700" y="650" fill="#f5f2e9" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700">Add your Orbit Garden screenshot here</text>
  <text x="700" y="692" fill="#94a3b8" text-anchor="middle" font-family="sans-serif" font-size="20">docs/screenshot-placeholder.svg</text>
</svg>
